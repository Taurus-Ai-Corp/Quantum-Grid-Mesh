name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm type-check
      - run: pnpm test
      - run: pnpm build

  deploy-landing:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: team_ljtVg59YsYUDbIdetyyOVg05
      VERCEL_PROJECT_ID: prj_Aa1xuuC3MAC9ZB4vtyCdjikmHX7q
    steps:
      - uses: actions/checkout@v4
      - name: Deploy landing to Vercel
        run: |
          echo "Deploying landing to Vercel..."
          npx vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }} --scope taurus-s-projects
          echo "landing deployed"

  deploy-comply:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      VERCEL_ORG_ID: team_ljtVg59YsYUDbIdetyyOVg05
      VERCEL_PROJECT_ID: prj_9E7o3VMvRcqtWYMDrpk4NIxDFskx
    steps:
      - uses: actions/checkout@v4
      - name: Deploy comply to Vercel
        run: |
          echo "Deploying comply to Vercel..."
          npx vercel deploy --prod --yes --token ${{ secrets.VERCEL_TOKEN }} --scope taurus-s-projects
          echo "comply deployed"
